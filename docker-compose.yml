# version field is obsolete in Compose v2 — removed to suppress the warning

networks:
  d2net:
    driver: bridge

volumes:
  mongo_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:

services:

  mongo:
    image: mongo:7
    container_name: d2_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - d2net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: d2_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - d2net
    healthcheck:
      # Qdrant image has no curl/wget. Check port 6333 (hex 18BD) is in LISTEN
      # state via /proc/net/tcp — works in any minimal Linux container.
      test: ["CMD-SHELL", "grep -q '00000000:18BD' /proc/net/tcp || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  neo4j:
    image: neo4j:5
    container_name: d2_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASS}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt driver
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - d2net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    build: .
    container_name: d2_api
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/?authSource=admin
      PYTHONUNBUFFERED: "1"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASS: ${NEO4J_PASS}
      QDRANT_COLLECTION: d2_chunks
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - d2net
